name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build release notes from changelog
        id: notes
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          version="${tag#v}"
          notes_file="release-notes.md"

          awk -v version="$version" '
            $0 ~ "^## \\[" version "\\]" { capture = 1; next }
            capture && /^## \[/ { exit }
            capture { print }
          ' CHANGELOG.md > "$notes_file"

          if grep -q '[^[:space:]]' "$notes_file"; then
            echo "has_notes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_notes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update release from changelog
        if: steps.notes.outputs.has_notes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --notes-file release-notes.md --latest
          else
            gh release create "$tag" --title "$tag" --notes-file release-notes.md --latest
          fi

      - name: Create or update release with generated notes
        if: steps.notes.outputs.has_notes != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release edit "$tag" --title "$tag" --latest
          else
            gh release create "$tag" --title "$tag" --generate-notes --latest
          fi
